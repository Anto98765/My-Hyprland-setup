general {
    gaps_in = 7
    gaps_out = 10

    border_size = 1

    col.active_border = $primary
    col.inactive_border = $outline_variant

    resize_on_border = false

    allow_tearing = true

    layout = Dwindle
}

decoration {
    rounding = 12
    rounding_power = 4


    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1add)
    }

    blur {
        enabled = true
        size = 2
        passes = 2
        ignore_opacity = true

        noise = 0
        contrast = 1.6
        popups = true

        xray = false
        new_optimizations = true
    }

}

