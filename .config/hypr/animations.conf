animations {
    enabled = true

    # ─────────────────────────────────────────────
    # Bézier Curves
    # ─────────────────────────────────────────────

    bezier = overshot,     0.05, 0.9,  0.1,  1.05

    bezier = smoothOut,    0.36, 0,    0.66, -0.56

    bezier = smoothIn,     0.25, 1,    0.5,  1

    bezier = fluid,        0.4,  0,    0.2,  1

    bezier = bounce,       0.175, 0.885, 0.32, 1.275
    
    bezier = 1,            0.5, 0.0, 0.357, 1.0

    bezier = rofiCurve,    0.05 , 0.9, 0.1, 1.05
    # ─────────────────────────────────────────────
    # Window Animations
    # ─────────────────────────────────────────────

    animation = windowsIn,    1, 4.0, default, slide
   #animation = windowsIn,    1, 5, overshot, slide

    animation = windowsOut,   1, 4.0, 1, popin 80%
   #animation = windowsOut,   1, 4, smoothIn, popin 80%

    animation = windowsMove,  1, 4, fluid

    # ─────────────────────────────────────────────
    # Fade Animations
    # ─────────────────────────────────────────────

    animation = fade,         1, 4, fluid
    animation = fadeIn,       1, 5, smoothIn
    animation = fadeOut,      1, 4, smoothOut
    animation = fadeSwitch,   1, 5, fluid
    animation = fadeShadow,   1, 6, fluid
    animation = fadeDim,      1, 5, fluid

    # ─────────────────────────────────────────────
    # Border & Decorations
    # ─────────────────────────────────────────────

    animation = border,       1, 10, fluid

    animation = borderangle,  1, 30, fluid, loop

    # ─────────────────────────────────────────────
    # Workspace Transitions
    # ─────────────────────────────────────────────

    animation = workspaces,        1, 5, fluid, slide

    animation = specialWorkspace,  1, 6, bounce, slidevert

    animation = workspacesIn,      1, 4.5, 1, slide

    animation = workspacesOut,     1, 4.5, 1, slide

    # ─────────────────────────────────────────────
    # Layers Transitions
    # ─────────────────────────────────────────────

    animation = layersIn,          1, 3.5, 1

    animation = layersOut,         1, 8.0, 1

}
