$Wallpaper         = ~/.config/hypr/hyprlock/wallpaper


background {
	path = $Wallpaper
	blur_passes = 1
	brightness = 0.5172
	vibrancy = 0.1696
	vibrancy = 0.0
}


general {
	no_fade_in = false
	grace = 0
	disable_loading_bar = false
	hide_cursor = true
}


input-field {
	size = 125, 29
	outline_thickness = 2
	dots_size = 0.2
	dots_spacing = 0.2
	dots_center = true
	outer_color = rgba(0, 0, 0, 0)
	inner_color = rgba(0, 0, 0, 0.4)
	font_color = rgb(200, 200, 200)
	fade_on_empty = false
  font_family = SF Pro Display Semibold
	placeholder_text = <span>Enter Password</span>
	hide_input = false
	position = 0 ,-335
	halign = center
	valign = center
}


label {
	text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
	color = rgba(216,222,233,0.70)
	font_size = 90
	font_family = Mogra regular
	position = 0, 200
	halign = center
	valign = center
}


label {
	text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
        color = rgba(216,222,233,0.70)
        font_size = 30
	      font_family = Mogra regular
        position = 0, 300
        halign = center
        valign = center
}


image {
	path = ~/.config/hypr/hyprlock/user-img.jpg
	border_color = 0xffdddddd
	border_size = 0
	size = 56
	rounding = -1
	reload_time = -1
	reload_cmd = 
	position = 0, -255
        halign = center
        valign = center
}



label {
	text = $USER
	color = #white
	font_size = 13
	font_family = Mogra regular
	position = 0, -305
        halign = center
        valign = center
}








